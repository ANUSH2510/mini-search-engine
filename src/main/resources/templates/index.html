<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
      <title>Mini Search Engine</title>

      <style>
          body {
              background: radial-gradient(circle at top,#1f2937,#111827 40%,#050505 100%);
              color: white;
              min-height: 100vh;
          }
          h1{
              text-align: center;
              font-size: 64px;
              margin-bottom: 10px;
          }

          form{
              text-align: center;
              margin-bottom: 30px;
          }


          input{
              width:650px;
              padding: 14px;
              font-size: 16px;

              background: rgba(255,255,255,0.08);
              backdrop-filter: blur(10px);

              color: white;

              border: 1px solid rgba(255,255,255,0.2);
              border-radius: 30px;
              outline: none;
          }
          input::placeholder{
              color: #cbd5e1;
          }
          button{
              padding: 14px 30px;
              font-size: 18px;
              border:none;
              border-radius: 30px;
              background:#4285f4;
              color:white;
              cursor: pointer;
              margin-left:10px;
          }
          button:hover{
              transform:scale(1.05);
              transition: 0.3s;
          }
          form{
              text-align: center;
              margin-bottom: 30px;
          }
          .result{
              width:70%;
              margin:25px auto;
              padding: 15px;
              text-align:left;
          }
          .result:hover{
              background: #f5f5f5;
          }
          .title{
              font-size:32px;
              color: #4ea1ff;
              text-decoration: none;
              font-weight: 500;
          }
          .title:hover{
              text-decoration: underline;
          }
          .url{
              color: #22c55e;
              margin-top:5px;
              font-size: 14px;
          }
          .snippet{
              color:#d1d5db;
              margin-top:10px;
              font-size: 18px;
              line-height:1.6;
          }
          .top-info{
              position: absolute;
              top:25px;
              right:40px;
              text-align:right;
          }
          #clock{
              font-size:32px;
              font-weight:bold;
          }
          #date{
              font-size:18px;
              color: #b8b8b8;
          }
          .subtitle{
              text-align:center;
              color:#b8b8b8;
              font-size:24px;
              margin-bottom:50px;
          }
          .results{
              max-width: 900px;
              margin: auto;
          }
          .logo{
              text-align:center;
              font-size:48px;
              margin-bottom: 30px;
              color: white;
          }

          </style>
</head>
<body>
<h2 class="logo">Mini Search Engine</h2>
<form action ="/search-page" method="get">
    <input type="text" name="q" th:value="${query}" placeholder="Search here...">
    <button type="submit">Search</button>
</form>
<div th:if="${results == null}">
<div class="top-info">
    <div id="clock"></div>
    <div id="date"></div>
</div>

<h1 id="greeting">Good Evening</h1>

<p class="subtitle">
    What would you like to discover?
</p>

</div>
<div class="results">
<div th:each="result : ${results}" class="result">

    <a class = "title"
       th:href="${result.url}"
       target="_blank"
       th:text="${result.title}">
    </a>

    <div class="url" th:text="${result.url}"></div>
    <p class="snippet" th:utext="${result.snippet}"></p>



</div>
</div>

<script>
    function updateClock() {
        const now = new Date();

        document.getElementById("clock").innerText=now.toLocaleTimeString("en-IN");
        document.getElementById("date").innerText=now.toLocaleDateString("en-IN",{
            weekday:"long",
            day:"numeric",
            month:"long",
            year:"numeric",
        });
    }
    updateClock();
    setInterval(updateClock, 1000);
</script>

</body>
</html>
